<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }

  /* Header band */
  .card-header {
    background: linear-gradient(135deg, #F5A623 0%, #E8920D 100%);
    height: 100px;
    position: relative;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 40px;
    background: #fff;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* Profile photo */
  .profile-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -60px;
    position: relative;
    z-index: 2;
    padding: 0 24px;
  }

  .profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid #fff;
    object-fit: cover;
    object-position: center 10%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  .name {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-top: 14px;
    letter-spacing: -0.3px;
  }

  .title {
    font-size: 13px;
    color: #F5A623;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .license {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }

  /* Logo section */
  .logo-section {
    display: flex;
    justify-content: center;
    margin: 18px 24px 0;
    padding: 14px 20px;
    background: #fafafa;
    border-radius: 14px;
    border: 1px solid #f0f0f0;
  }

  .logo-section img {
    height: 52px;
    object-fit: contain;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #f0f0f0;
    margin: 20px 24px;
  }

  /* Contact buttons */
  .contacts {
    padding: 0 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contact-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 14px;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1.5px solid #f0f0f0;
    background: #fff;
    cursor: pointer;
  }

  .contact-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border-color: #F5A623;
  }

  .icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-wrap.whatsapp { background: #e8f9ef; }
  .icon-wrap.instagram { background: #fdeef6; }
  .icon-wrap.email { background: #eef2ff; }

  .icon-wrap svg { width: 22px; height: 22px; }

  .btn-text { display: flex; flex-direction: column; }
  .btn-label { font-size: 11px; color: #aaa; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-value { font-size: 14px; color: #1a1a1a; font-weight: 600; margin-top: 1px; }

  /* Save contact button */
  .save-btn {
    margin: 0 20px 24px;
    background: linear-gradient(135deg, #F5A623, #E8920D);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    width: calc(100% - 40px);
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,166,35,0.4);
  }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: #ccc;
    padding-bottom: 20px;
  }
</style>
